[theme]
theme = "slick"
[icons]
icons = "emoji"

[[block]]
block = "focused_window"
format = "$title.str(max_w:80) |"

[[block]]
block = "disk_space"
info_type = "available"
alert_unit = "GB"
warning = 20
alert = 10

[[block]]
block = "memory"

[[block]]
block = "cpu"
interval = 1

[[block]]
block = "sound"
step_width = 5

# [[block]]
# block = "backlight"
# cycle = [0, 1, 5, 10, 50, 100]

[[block]]
block = "battery"
interval = 60
if_command = "test -e /sys/class/power_supply/BAT*"
empty_format = " $icon $percentage "

[[block]]
block = "custom"
command = "toggl view-timer 2>/dev/null | grep -oP 'description: \"\\K[^\"]+' | sed 's/^./🈺 &/'"
interval = 180
format = " $text.str(max_w:64) |"

[[block]]
block = "pomodoro"
notify_cmd = "notify-send '{msg}'"
blocking_cmd = false

[[block]]
block = "time"
interval = 30
format = " $icon $timestamp.datetime(f:'%a, %Y/%m/%d %R') "
