# Disable automatic profile switching between A2DP and HSP/HFP
# This prevents WirePlumber from changing the profile when apps request a mic
wireplumber.settings = {
  bluetooth.autoswitch-to-headset-profile = false
}

# Force ATH-CK1TW to always use headset-head-unit (HSP/HFP) profile
monitor.bluez.rules = [
  {
    matches = [
      {
        device.description = "ATH-CK1TW"
      }
    ]
    actions = {
      update-props = {
        bluez5.auto-connect = [ headset-head-unit ]
        device.profile = "headset-head-unit"
      }
    }
  }
]
