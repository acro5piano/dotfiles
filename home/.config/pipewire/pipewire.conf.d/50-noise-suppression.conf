# RNNoise-based noise suppression for microphone input
# Per-device filter chains so each input gets its own noise-canceled virtual source.
# To find device node names: pw-cli ls Node | grep -E '(node.name|media.class)'

context.modules = [
    # USB Webcam (Logitech C270)
    { name = libpipewire-module-filter-chain
        flags = [ nofail ]
        args = {
            node.description = "Noise Canceling source (Webcam)"
            media.name       = "Noise Canceling source (Webcam)"
            node.latency     = "480/48000"
            filter.graph = {
                nodes = [
                    {
                        type   = ladspa
                        name   = rnnoise
                        plugin = "/usr/lib/ladspa/librnnoise_ladspa.so"
                        label  = noise_suppressor_mono
                        control = {
                            "VAD Threshold (%)" = 50.0
                        }
                    }
                ]
            }
            audio.position = [ MONO ]
            capture.props = {
                node.name      = "effect_input.rnnoise_webcam"
                node.passive   = true
                target.object  = "alsa_input.usb-046d_C270_HD_WEBCAM_200901010001-02.mono-fallback"
            }
            playback.props = {
                node.name   = "effect_output.rnnoise_webcam"
                media.class = Audio/Source
            }
        }
    }

    # Bluetooth headset
    { name = libpipewire-module-filter-chain
        flags = [ nofail ]
        args = {
            node.description = "Noise Canceling source (Bluetooth)"
            media.name       = "Noise Canceling source (Bluetooth)"
            node.latency     = "480/48000"
            filter.graph = {
                nodes = [
                    {
                        type   = ladspa
                        name   = rnnoise
                        plugin = "/usr/lib/ladspa/librnnoise_ladspa.so"
                        label  = noise_suppressor_mono
                        control = {
                            "VAD Threshold (%)" = 50.0
                        }
                    }
                ]
            }
            audio.position = [ MONO ]
            capture.props = {
                node.name      = "effect_input.rnnoise_bluetooth"
                node.passive   = true
                target.object  = "bluez_input.50:C2:75:34:94:89"
            }
            playback.props = {
                node.name   = "effect_output.rnnoise_bluetooth"
                media.class = Audio/Source
            }
        }
    }
]
